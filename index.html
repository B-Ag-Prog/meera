<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEERA - Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Gotu&family=Nosifer&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #050101;
        color: #b0a090;
        font-family: 'Crimson Text', serif;
        overflow-x: hidden;
        cursor: none;
        margin: 0;
      }
      .font-hindi { font-family: 'Gotu', sans-serif; }
      .font-horror { font-family: 'Nosifer', cursive; }
      ::-webkit-scrollbar { width: 0px; background: transparent; }
      
      @keyframes glitch {
        0% { transform: translate(0); }
        2% { transform: translate(-2px, 2px); }
        4% { transform: translate(2px, -2px); }
        6% { transform: translate(0); }
        100% { transform: translate(0); }
      }
      .animate-glitch { animation: glitch 3s infinite alternate; }

      .bg-radial-blood {
        background: radial-gradient(circle, rgba(127, 29, 29, 0.15) 0%, rgba(0, 0, 0, 1) 70%);
      }

      /* Enter overlay styles */
      #enter-overlay {
        position: fixed;
        inset: 0;
        background-color: #050101;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease-out;
      }
      
      #enter-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      #enter-btn {
        padding: 1.5rem 3rem;
        font-size: 1.5rem;
        background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
        color: #b0a090;
        border: 2px solid #7f1d1d;
        cursor: pointer;
        font-family: 'Nosifer', cursive;
        letter-spacing: 0.5em;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(127, 29, 29, 0.5);
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
      }
      
      #enter-btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      
      #enter-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 40px rgba(127, 29, 29, 0.8);
        border-color: #991b1b;
      }
      
      #enter-btn:hover::before {
        transform: translateX(100%);
      }

      .subtitle-text {
        margin-top: 2rem;
        font-size: 0.875rem;
        color: rgba(176, 160, 144, 0.5);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-family: 'Crimson Text', serif;
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }

      .pulse-glow {
        animation: pulse-glow 3s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "framer-motion": "https://esm.sh/framer-motion@^12.33.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- Enter overlay for autoplay compatibility -->
    <div id="enter-overlay">
      <button id="enter-btn">ENTER</button>
      <p class="subtitle-text pulse-glow">Click to Hear Her Truth</p>
      <div class="absolute inset-0 bg-radial-blood pointer-events-none"></div>
    </div>

    <div id="root"></div>
    
    <script>
      // Handle user interaction for autoplay
      document.getElementById('enter-btn').addEventListener('click', function() {
        // Dispatch custom event that React will listen for
        window.dispatchEvent(new Event('userInteracted'));
        
        // Hide overlay with fade effect
        const overlay = document.getElementById('enter-overlay');
        overlay.classList.add('hidden');
        
        // Remove from DOM after transition
        setTimeout(() => {
          overlay.remove();
        }, 800);
      });
    </script>
    
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
